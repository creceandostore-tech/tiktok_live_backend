<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Live Credits - TikTok Integration</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .header {
      background: linear-gradient(135deg, #fe2c55, #ff4f7a);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .content { padding: 20px; }
    .card {
      background: #f8f8fa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row { display: flex; gap: 10px; margin-bottom: 12px; }
    .input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
    }
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-pink { background: #fe2c55; color: white; }
    .btn-red { background: #ff3b30; color: white; }
    .btn-small { padding: 8px 16px; font-size: 14px; }
    .hit {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    .hit-pic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ddd, #ccc);
      overflow: hidden;
    }
    .hit-pic img { width: 100%; height: 100%; object-fit: cover; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .connected { background: #e6f7e6; color: #0a5c0a; }
    .disconnected { background: #ffe6e6; color: #c41e1e; }
    .chat-log {
      background: #f0f0f0;
      border-radius: 12px;
      padding: 10px;
      height: 120px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0;
    }
    .pack {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
    }
    .pack.active { border-color: #fe2c55; background: #fff0f3; }
    .button-group { display: flex; gap: 10px; margin-top: 10px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Live Credits</h1>
    <p>Transferencia de créditos en vivo</p>
  </div>
  <div class="content">
    <div class="card">
      <div style="font-weight:600; margin-bottom:10px">🎁 Gift</div>
      <div class="row">
        <input id="usernameInput" class="input" placeholder="Usuario de TikTok" />
        <button id="searchUserBtn" class="btn btn-pink">Buscar</button>
      </div>
      <div class="hit">
        <div class="hit-pic" id="hitPic"></div>
        <div>
          <div id="hitName" style="font-weight:600">Usuario</div>
          <div id="previewUser" style="font-size:12px; color:#888">No seleccionado</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:600; margin-bottom:10px">💰 Recharge</div>
      <div class="grid" id="packsGrid"></div>
      <div class="custom-box" id="openCustom" style="text-align:center; padding:10px; background:#fff; border-radius:12px; border:1px dashed #ccc; margin-top:10px; cursor:pointer">✨ Custom amount</div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
        <span>📱 TikTok Live</span>
        <span id="connectionStatusBadge" class="status-badge disconnected">● Desconectado</span>
      </div>
      <div class="row">
        <input id="tiktokUsername" class="input" placeholder="Usuario en vivo" />
      </div>
      <div class="button-group">
        <button id="connectTikTokBtn" class="btn btn-pink btn-small">Conectar</button>
        <button id="disconnectTikTokBtn" class="btn btn-red btn-small" style="display:none">Desconectar</button>
      </div>
      <div id="liveViewerCount" style="font-size:12px; color:#fe2c55; margin-top:8px"></div>
    </div>

    <div class="card">
      <div style="font-weight:600; margin-bottom:10px">💬 Chat Commands</div>
      <div class="row">
        <input id="chatCommandInput" class="input" placeholder="!send @usuario 100" />
        <button id="sendChatCommand" class="btn btn-pink btn-small">Enviar</button>
      </div>
      <div id="chatLog" class="chat-log">💬 Esperando comandos...</div>
    </div>
  </div>
</div>

<script>
  let balance = 75889155;
  let selectedCoins = 350;
  let customDigits = '0';
  let currentViewersMap = new Map();
  let ws = null;

  const packs = [
    {coins:70, usd:0.74, note:"Popular"},
    {coins:350, usd:3.65, note:"Starter"},
    {coins:700, usd:7.4, note:"Best value"},
    {coins:1400, usd:14.8, note:"Extended"},
    {coins:3500, usd:37.0, note:"Creator"},
    {coins:7000, usd:74.0, note:"Premium"}
  ];

  function fmtCoins(n) { return Number(n).toLocaleString('en-US'); }
  function fmtUSD(n) { return 'US$' + Number(n).toFixed(2); }
  function currentUser() { return document.getElementById('usernameInput').value.trim().replace(/^@/,''); }

  function renderPacks() {
    const grid = document.getElementById('packsGrid');
    grid.innerHTML = '';
    packs.forEach(p => {
      const btn = document.createElement('div');
      btn.className = 'pack' + (p.coins === selectedCoins ? ' active' : '');
      btn.innerHTML = `<div style="font-weight:700">${fmtCoins(p.coins)}</div><div style="font-size:12px">${fmtUSD(p.usd)}</div><div style="font-size:10px; color:#888">${p.note}</div>`;
      btn.onclick = () => {
        document.querySelectorAll('.pack').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCoins = p.coins;
        alert(`Seleccionado ${fmtCoins(p.coins)} créditos - ${fmtUSD(p.usd)}`);
      };
      grid.appendChild(btn);
    });
  }

  function updateUserViews() {
    const username = currentUser();
    const hitPic = document.getElementById('hitPic');
    const hitName = document.getElementById('hitName');
    const previewUser = document.getElementById('previewUser');
    const found = currentViewersMap.get(username);
    if (username && found) {
      hitName.textContent = found.nickname || username;
      previewUser.textContent = `@${username}`;
      if (found.avatar && found.avatar !== 'null') {
        hitPic.innerHTML = `<img src="${found.avatar}" onerror="this.style.display='none'">`;
      } else {
        hitPic.innerHTML = '';
      }
    } else {
      hitName.textContent = username || 'Usuario';
      previewUser.textContent = username ? `@${username}` : 'No seleccionado';
      hitPic.innerHTML = '';
    }
  }

  function addChatLog(msg, isErr = false) {
    const log = document.getElementById('chatLog');
    const p = document.createElement('div');
    p.textContent = msg;
    p.style.color = isErr ? '#ff3b30' : '#666';
    p.style.fontSize = '11px';
    p.style.marginBottom = '4px';
    log.appendChild(p);
    log.scrollTop = log.scrollHeight;
    while(log.children.length > 20) log.removeChild(log.firstChild);
  }

  document.getElementById('searchUserBtn').onclick = async () => {
    const username = currentUser();
    if (!username) { alert('Ingresa un username'); return; }
    const btn = document.getElementById('searchUserBtn');
    const original = btn.textContent;
    btn.textContent = 'Buscando...';
    btn.disabled = true;
    try {
      const res = await fetch(`/search/${username}`);
      const data = await res.json();
      if (data.avatar) {
        addChatLog(`✅ @${username} - Foto encontrada`);
        if (currentViewersMap.has(username)) {
          currentViewersMap.get(username).avatar = data.avatar;
        } else {
          currentViewersMap.set(username, { username, nickname: data.nickname, avatar: data.avatar });
        }
        updateUserViews();
      } else if (data.found) {
        addChatLog(`✅ @${username} encontrado (sin foto)`);
      } else {
        addChatLog(`⚠️ @${username} no encontrado`);
      }
    } catch(e) {
      addChatLog(`❌ Error: ${e.message}`, true);
    } finally {
      btn.textContent = original;
      btn.disabled = false;
    }
  };

  function initWebSocket() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);
    ws.onopen = () => addChatLog('✅ Conectado al servidor');
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'viewers') {
          currentViewersMap.clear();
          data.data.forEach(v => currentViewersMap.set(v.username, v));
          document.getElementById('liveViewerCount').textContent = `👥 ${data.total} espectadores`;
          addChatLog(`📡 ${data.data.length} espectadores (total: ${data.total})`);
          updateUserViews();
        } else if (data.type === 'connection_status') {
          const badge = document.getElementById('connectionStatusBadge');
          const connectBtn = document.getElementById('connectTikTokBtn');
          const disconnectBtn = document.getElementById('disconnectTikTokBtn');
          if (data.connected) {
            badge.className = 'status-badge connected';
            badge.innerHTML = '● Conectado';
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'block';
          } else {
            badge.className = 'status-badge disconnected';
            badge.innerHTML = '● Desconectado';
            connectBtn.style.display = 'block';
            disconnectBtn.style.display = 'none';
          }
          if (data.message) addChatLog(data.message);
        }
      } catch(e) { console.error(e); }
    };
    ws.onclose = () => {
      addChatLog('🔌 Desconectado, reconectando...', true);
      setTimeout(initWebSocket, 3000);
    };
  }

  document.getElementById('connectTikTokBtn').onclick = async () => {
    const username = document.getElementById('tiktokUsername').value.trim();
    if (!username) { alert('Ingresa username de TikTok'); return; }
    const btn = document.getElementById('connectTikTokBtn');
    btn.textContent = 'Conectando...';
    btn.disabled = true;
    try {
      const res = await fetch(`/connect/${username}`);
      const data = await res.json();
      if (data.status === 'connected') addChatLog(`✅ Conectado a @${username}`);
      else addChatLog(`❌ Error: ${data.error}`, true);
    } catch(e) { addChatLog(`❌ Error: ${e.message}`, true); }
    finally { btn.textContent = 'Conectar'; btn.disabled = false; }
  };

  document.getElementById('disconnectTikTokBtn').onclick = async () => {
    const btn = document.getElementById('disconnectTikTokBtn');
    btn.textContent = 'Desconectando...';
    btn.disabled = true;
    try {
      await fetch('/disconnect');
      addChatLog('✅ Desconectado manualmente');
    } catch(e) { addChatLog(`❌ Error: ${e.message}`, true); }
    finally { btn.textContent = 'Desconectar'; btn.disabled = false; }
  };

  document.getElementById('sendChatCommand').onclick = () => {
    const cmd = document.getElementById('chatCommandInput').value;
    if (cmd) addChatLog(`🧪 Comando: ${cmd}`);
  };

  renderPacks();
  initWebSocket();
  updateUserViews();
</script>
</body>
</html>
