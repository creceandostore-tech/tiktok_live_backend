<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Credits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f10;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #f2f2f7;
            border-radius: 28px;
            overflow: hidden;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(242, 242, 247, 0.96);
            backdrop-filter: blur(12px);
            padding: 16px;
            text-align: center;
            font-weight: 800;
            font-size: 18px;
            border-bottom: 1px solid #e5e5ea;
        }
        
        .content {
            padding: 16px;
        }
        
        .card {
            background: white;
            border-radius: 22px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .profile-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .avatar-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #fe2c55, #ff4f7a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        
        .name {
            font-size: 22px;
            font-weight: 800;
        }
        
        .balance {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        
        .secure {
            background: #e9f7ef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #19a55a;
            font-weight: 800;
        }
        
        .label {
            font-weight: 800;
            margin-bottom: 8px;
        }
        
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .input {
            flex: 1;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            padding: 14px;
            font-size: 16px;
            outline: none;
        }
        
        .input:focus {
            border-color: #fe2c55;
        }
        
        .btn {
            border: none;
            border-radius: 14px;
            padding: 14px 20px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-pink {
            background: linear-gradient(90deg, #fe2c55, #ff4f7a);
            color: white;
        }
        
        .user-card {
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 12px;
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #dce4ff, #a3b9ff);
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
        }
        
        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .user-name {
            font-weight: 800;
        }
        
        .user-username {
            font-size: 13px;
            color: #777;
            margin-top: 4px;
        }
        
        .packs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        
        .pack {
            border: 1px solid #e5e5ea;
            border-radius: 18px;
            padding: 14px;
            background: white;
            cursor: pointer;
            text-align: left;
        }
        
        .pack.active {
            border-color: #fe2c55;
            background: #fff3f7;
        }
        
        .pack-coins {
            font-weight: 800;
            font-size: 16px;
        }
        
        .pack-price {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .chat-panel {
            background: white;
            border-radius: 22px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .chat-log {
            background: #f8f8fa;
            border-radius: 14px;
            padding: 8px;
            margin-top: 12px;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .debug {
            background: #1e1e1e;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            border-radius: 8px;
            margin-top: 16px;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .suggestions-list {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            width: calc(100% - 10px);
        }
        
        .suggestions-list div {
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .suggestions-list div:hover {
            background: #f0f0f0;
        }
        
        .suggestions-container {
            position: relative;
            flex: 1;
        }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 28px 28px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1000;
        }
        
        .bottom-sheet.show {
            transform: translateY(0);
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Credits Center</div>
        
        <div class="content">
            <div class="card">
                <div class="profile">
                    <div class="profile-left">
                        <div class="avatar-icon" id="avatarIcon">C</div>
                        <div>
                            <div class="name">Live Credits</div>
                            <div class="balance">💰 75,889,155 | DEMO24X</div>
                        </div>
                    </div>
                    <div class="secure">● Secure Payment</div>
                </div>
                
                <div class="label">🎁 Gift</div>
                <div class="row">
                    <div class="suggestions-container">
                        <input type="text" id="usernameInput" class="input" placeholder="Enter username" autocomplete="off">
                        <div id="suggestions" class="suggestions-list"></div>
                    </div>
                    <button class="btn btn-pink" id="confirmBtn">Confirm</button>
                </div>
                
                <div class="user-card" id="userCard">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div>
                        <div class="user-name" id="userName">User</div>
                        <div class="user-username" id="userUsername">No user selected</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="label">💰 Recharge</div>
                <div class="packs-grid" id="packsGrid"></div>
            </div>
            
            <div class="chat-panel">
                <div class="label">🎤 Comandos del chat</div>
                <div class="row">
                    <input type="text" id="chatInput" class="input" placeholder="Ej: !send @usuario 350">
                    <button class="btn btn-pink" id="sendBtn">Enviar</button>
                </div>
                <div id="chatLog" class="chat-log">💬 Esperando comandos...</div>
            </div>
            
            <div class="debug" id="debugPanel">
                🔍 Debug: Conectando...
            </div>
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <h3>Transfer Summary</h3>
        <p id="summaryUser">Transfer to: user</p>
        <p id="summaryAmount">Amount: 350 credits</p>
        <p id="summaryFee">Fee: US$0.22</p>
        <p id="summaryTotal">Total: US$3.87</p>
        <button class="btn btn-pink" id="confirmTransfer" style="width:100%; margin-top:16px">Confirm</button>
        <button id="closeSheet" style="margin-top:8px; width:100%; padding:12px; border:none; background:#f0f0f0; border-radius:14px">Cancel</button>
    </div>
    
    <script>
        let viewers = new Map();
        let selectedCoins = 350;
        let selectedUsd = 3.65;
        let balance = 75889155;
        
        const packs = [
            {coins: 70, usd: 0.74, note: "Popular"},
            {coins: 350, usd: 3.65, note: "Starter"},
            {coins: 700, usd: 7.4, note: "Best value"},
            {coins: 1400, usd: 14.8, note: "Extended"},
            {coins: 3500, usd: 37.0, note: "Creator"},
            {coins: 7000, usd: 74.0, note: "Premium"}
        ];
        
        function addDebug(msg) {
            const debug = document.getElementById('debugPanel');
            const time = new Date().toLocaleTimeString();
            debug.innerHTML += `<div>[${time}] ${msg}</div>`;
            debug.scrollTop = debug.scrollHeight;
            if (debug.children.length > 30) debug.removeChild(debug.firstChild);
            console.log(msg);
        }
        
        function renderPacks() {
            const grid = document.getElementById('packsGrid');
            grid.innerHTML = '';
            packs.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'pack';
                if (p.coins === selectedCoins) btn.classList.add('active');
                btn.innerHTML = `
                    <div class="pack-coins">💰 ${p.coins.toLocaleString()}</div>
                    <div class="pack-price">US$${p.usd}</div>
                    <div style="font-size:11px; color:#999">${p.note}</div>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.pack').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCoins = p.coins;
                    selectedUsd = p.usd;
                    updateSummary();
                    document.getElementById('bottomSheet').classList.add('show');
                    document.getElementById('overlay').classList.add('show');
                };
                grid.appendChild(btn);
            });
        }
        
        function updateSummary() {
            const fee = (selectedUsd * 0.06).toFixed(2);
            const total = (selectedUsd + parseFloat(fee)).toFixed(2);
            const username = document.getElementById('usernameInput').value || 'user';
            document.getElementById('summaryUser').innerHTML = `Transfer to: @${username}`;
            document.getElementById('summaryAmount').innerHTML = `Amount: ${selectedCoins.toLocaleString()} credits`;
            document.getElementById('summaryFee').innerHTML = `Fee: US$${fee}`;
            document.getElementById('summaryTotal').innerHTML = `Total: US$${total}`;
        }
        
        function updateUserCard(username) {
            const user = viewers.get(username);
            const avatarDiv = document.getElementById('userAvatar');
            const nameDiv = document.getElementById('userName');
            const usernameDiv = document.getElementById('userUsername');
            
            if (user) {
                nameDiv.textContent = user.nickname || username;
                usernameDiv.textContent = `@${username}`;
                if (user.avatar) {
                    avatarDiv.innerHTML = `<img src="${user.avatar}" onerror="this.parentElement.innerHTML='👤'">`;
                } else {
                    avatarDiv.innerHTML = '👤';
                    avatarDiv.style.background = 'linear-gradient(135deg,#dce4ff,#a3b9ff)';
                }
            } else {
                nameDiv.textContent = 'User';
                usernameDiv.textContent = username ? `@${username} · Account` : 'No user selected';
                avatarDiv.innerHTML = '👤';
                avatarDiv.style.background = 'linear-gradient(135deg,#dce4ff,#a3b9ff)';
            }
        }
        
        function updateSuggestions(input) {
            const suggestionsDiv = document.getElementById('suggestions');
            if (!input.trim()) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const matches = Array.from(viewers.keys()).filter(u => u.toLowerCase().includes(input.toLowerCase()));
            if (matches.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            suggestionsDiv.innerHTML = '';
            matches.slice(0, 6).forEach(m => {
                const user = viewers.get(m);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div style="width:32px;height:32px;border-radius:50%;background:#fe2c55;display:flex;align-items:center;justify-content:center;color:white">${(user?.nickname || m).charAt(0).toUpperCase()}</div>
                    <div><strong>@${m}</strong><br><small>${user?.nickname || m}</small></div>
                `;
                div.onclick = () => {
                    document.getElementById('usernameInput').value = m;
                    updateUserCard(m);
                    suggestionsDiv.style.display = 'none';
                };
                suggestionsDiv.appendChild(div);
            });
            suggestionsDiv.style.display = 'block';
        }
        
        function addChatLog(msg, isError = false) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.textContent = msg;
            div.style.color = isError ? '#d93d61' : '#666';
            div.style.padding = '4px 0';
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 20) log.removeChild(log.firstChild);
            addDebug(msg);
        }
        
        function processCommand(cmd) {
            const parts = cmd.split(' ');
            if (parts[0] !== '!send' || parts.length < 3) return false;
            
            let target = parts[1];
            if (target.startsWith('@')) target = target.substring(1);
            const amount = parseInt(parts[2]);
            
            if (isNaN(amount) || amount <= 0) {
                addChatLog(`❌ Cantidad inválida: ${parts[2]}`, true);
                return false;
            }
            
            document.getElementById('usernameInput').value = target;
            updateUserCard(target);
            
            let bestPack = packs[0];
            for (const pack of packs) {
                if (Math.abs(pack.coins - amount) < Math.abs(bestPack.coins - amount)) {
                    bestPack = pack;
                }
            }
            
            if (Math.abs(bestPack.coins - amount) / amount < 0.2) {
                selectedCoins = bestPack.coins;
                selectedUsd = bestPack.usd;
                addChatLog(`✅ ${target} recibirá ${bestPack.coins} créditos (${bestPack.note})`);
            } else {
                selectedCoins = amount;
                selectedUsd = amount * 0.0106;
                addChatLog(`✅ ${target} recibirá ${amount} créditos (personalizado)`);
            }
            
            updateSummary();
            document.getElementById('bottomSheet').classList.add('show');
            document.getElementById('overlay').classList.add('show');
            
            document.querySelectorAll('.pack').forEach(btn => {
                const coins = parseInt(btn.querySelector('.pack-coins')?.innerHTML.replace(/[^0-9]/g, '') || '0');
                if (coins === selectedCoins) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            return true;
        }
        
        // WebSocket
        let ws = null;
        let reconnectAttempts = 0;
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${protocol}//${window.location.host}`;
            addDebug(`Conectando WebSocket a ${url}`);
            
            ws = new WebSocket(url);
            
            ws.onopen = () => {
                addDebug('✅ WebSocket conectado');
                reconnectAttempts = 0;
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'viewers') {
                        viewers.clear();
                        data.data.forEach(v => {
                            viewers.set(v.username, v);
                        });
                        addDebug(`📊 Recibidos ${viewers.size} espectadores`);
                        const currentUser = document.getElementById('usernameInput').value;
                        if (currentUser) updateUserCard(currentUser);
                    } else if (data.type === 'command') {
                        addDebug(`🎮 Comando: ${data.command}`);
                        processCommand(data.command);
                    }
                } catch(e) {
                    addDebug(`Error: ${e.message}`);
                }
            };
            
            ws.onclose = () => {
                addDebug('🔌 Desconectado');
                if (reconnectAttempts < 10) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 3000);
                }
            };
            
            ws.onerror = (err) => {
                addDebug(`Error WebSocket: ${err.message}`);
            };
        }
        
        // Eventos
        document.getElementById('confirmBtn').onclick = () => {
            const username = document.getElementById('usernameInput').value.trim();
            if (username) updateUserCard(username);
        };
        
        document.getElementById('sendBtn').onclick = () => {
            const cmd = document.getElementById('chatInput').value;
            if (cmd) processCommand(cmd);
            document.getElementById('chatInput').value = '';
        };
        
        document.getElementById('chatInput').onkeypress = (e) => {
            if (e.key === 'Enter') {
                const cmd = document.getElementById('chatInput').value;
                if (cmd) processCommand(cmd);
                document.getElementById('chatInput').value = '';
            }
        };
        
        document.getElementById('usernameInput').oninput = (e) => {
            updateSuggestions(e.target.value);
        };
        
        document.getElementById('closeSheet').onclick = () => {
            document.getElementById('bottomSheet').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        };
        
        document.getElementById('confirmTransfer').onclick = () => {
            const username = document.getElementById('usernameInput').value;
            if (!username) {
                alert('Selecciona un usuario');
                return;
            }
            
            balance -= selectedCoins;
            document.querySelector('.balance').innerHTML = `💰 ${balance.toLocaleString()} | DEMO24X`;
            localStorage.setItem('balance', balance);
            
            document.getElementById('bottomSheet').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
            addChatLog(`✅ Transferencia completada a @${username} por ${selectedCoins.toLocaleString()} créditos`);
        };
        
        // Iniciar
        renderPacks();
        connectWebSocket();
        addDebug('🚀 Sistema iniciado');
        
        // Cargar balance guardado
        const saved = localStorage.getItem('balance');
        if (saved) {
            balance = parseInt(saved);
            document.querySelector('.balance').innerHTML = `💰 ${balance.toLocaleString()} | DEMO24X`;
        }
    </script>
</body>
</html>
